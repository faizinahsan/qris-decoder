services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qris-backend
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qris-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
